<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Finanzas Personales</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --income: #2ecc71;
            --expense: #e74c3c;
            --bg: #f4f6f9;
            --text: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary);
            font-size: 28px;
        }

        /* Tarjetas de Balance */
        .balance-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .card h3 {
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
        }

        #balance-total { color: var(--primary); }
        #total-ingresos { color: var(--income); }
        #total-gastos { color: var(--expense); }

        /* Zona central: Formulario y Gráfico */
        .main-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--primary);
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        /* Formularios */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1a252f;
        }

        /* Gráfico */
        .chart-container {
            max-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tabla de historial */
        .history-panel {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #eceff1;
            font-size: 14px;
        }

        th {
            background-color: #f8f9fa;
            color: var(--primary);
            font-weight: 600;
        }

        .monto-ingreso {
            color: var(--income);
            font-weight: 600;
        }

        .monto-gasto {
            color: var(--expense);
            font-weight: 600;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .balance-cards { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Control de Mis Finanzas</h1>
        </header>

        <div class="balance-cards">
            <div class="card">
                <h3>Balance Actual</h3>
                <p id="balance-total">Bs. 0.00</p>
            </div>
            <div class="card">
                <h3>Total Ingresos</h3>
                <p id="total-ingresos">Bs. 0.00</p>
            </div>
            <div class="card">
                <h3>Total Gastos</h3>
                <p id="total-gastos">Bs. 0.00</p>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2>Registrar Movimiento</h2>
                <form id="finance-form">
                    <div class="form-group">
                        <label for="fecha">Fecha</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="form-group">
                        <label for="tipo">Tipo de Movimiento</label>
                        <select id="tipo" required>
                            <option value="Ingreso">Ingreso</option>
                            <option value="Gasto">Gasto</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="monto">Monto (en Bs.)</label>
                        <input type="text" id="monto" placeholder="Ej. 207.218,13" required>
                    </div>
                    <div class="form-group">
                        <label for="categoria">Categoría</label>
                        <select id="categoria" required>
                            <option value="Sueldo">Sueldo / Ingreso</option>
                            <option value="Suscripciones">Suscripciones</option>
                            <option value="Transporte">Transporte (Moto)</option>
                            <option value="Comida">Comida / Salidas</option>
                            <option value="Trabajo">Trabajo / Educación</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="descripcion">Descripción corta</label>
                        <input type="text" id="descripcion" placeholder="Ej. Pago de internet" required>
                    </div>
                    <button type="submit" id="btn-guardar">Guardar Registro</button>
                </form>
            </div>

            <div class="panel">
                <h2>Distribución de Gastos</h2>
                <div class="chart-container">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
        </div>

        <div class="history-panel">
            <h2>Historial de Movimientos</h2>
            <br>
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Categoría</th>
                        <th>Descripción</th>
                        <th>Monto</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
// Tu enlace de SheetDB
        const apiURL = "https://sheetdb.io/api/v1/r065av9gcbpyr";
        let expenseChartObj = null;

        document.getElementById('fecha').valueAsDate = new Date();

        // Función para darle formato venezolano (puntos para miles, coma para decimales)
        function formatoBs(numero) {
            return numero.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function cargarDatos() {
            try {
                const response = await fetch(apiURL);
                const datos = await response.json();
                
                let ingresosTotales = 0;
                let gastosTotales = 0;
                let tablaHTML = "";
                
                const gastosPorCategoria = {
                    "Suscripciones": 0,
                    "Transporte": 0,
                    "Comida": 0,
                    "Trabajo": 0,
                    "Otros": 0
                };

                datos.reverse().forEach(item => {
                    const montoNum = parseFloat(item.monto) || 0;
                    
                    if (item.tipo === "Ingreso") {
                        ingresosTotales += montoNum;
                        tablaHTML += `
                            <tr>
                                <td>${item.fecha}</td>
                                <td>${item.tipo}</td>
                                <td>${item.categoria}</td>
                                <td>${item.descripcion}</td>
                                <td class="monto-ingreso">Bs. ${formatoBs(montoNum)}</td>
                            </tr>
                        `;
                    } else if (item.tipo === "Gasto") {
                        gastosTotales += montoNum;
                        
                        if (gastosPorCategoria[item.categoria] !== undefined) {
                            gastosPorCategoria[item.categoria] += montoNum;
                        } else {
                            gastosPorCategoria["Otros"] += montoNum;
                        }

                        tablaHTML += `
                            <tr>
                                <td>${item.fecha}</td>
                                <td>${item.tipo}</td>
                                <td>${item.categoria}</td>
                                <td>${item.descripcion}</td>
                                <td class="monto-gasto">Bs. ${formatoBs(montoNum)}</td>
                            </tr>
                        `;
                    }
                });

                const balanceFinal = ingresosTotales - gastosTotales;

                document.getElementById('balance-total').innerText = `Bs. ${formatoBs(balanceFinal)}`;
                document.getElementById('total-ingresos').innerText = `Bs. ${formatoBs(ingresosTotales)}`;
                document.getElementById('total-gastos').innerText = `Bs. ${formatoBs(gastosTotales)}`;

                document.getElementById('table-body').innerHTML = tablaHTML;

                actualizarGrafico(gastosPorCategoria);

            } catch (error) {
                console.error("Error cargando los datos:", error);
            }
        }

        function actualizarGrafico(datosGastos) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const categorias = Object.keys(datosGastos);
            const montos = Object.values(datosGastos);

            if (expenseChartObj) {
                expenseChartObj.destroy();
            }

            expenseChartObj = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: categorias,
                    datasets: [{
                        data: montos,
                        backgroundColor: ['#9b59b6', '#e67e22', '#e74c3c', '#3498db', '#95a5a6'],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        document.getElementById('finance-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btn-guardar');
            btn.innerText = "Guardando...";
            btn.disabled = true;

            const fecha = document.getElementById('fecha').value;
            const tipo = document.getElementById('tipo').value;
            let monto = document.getElementById('monto').value;
            const categoria = document.getElementById('categoria').value;
            const descripcion = document.getElementById('descripcion').value;

            // Limpiar el monto: quitamos puntos de miles y cambiamos la coma a punto decimal
            let montoLimpio = monto.replace(/\./g, '').replace(',', '.');

            const nuevoRegistro = {
                data: [
                    {
                        fecha: fecha,
                        tipo: tipo,
                        monto: montoLimpio, 
                        categoria: categoria,
                        descripcion: descripcion
                    }
                ]
            };

            try {
                const response = await fetch(apiURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoRegistro)
                });

                if (response.ok) {
                    document.getElementById('monto').value = "";
                    document.getElementById('descripcion').value = "";
                    await cargarDatos();
                } else {
                    alert("Hubo un problema al guardar. Intenta de nuevo.");
                }
            } catch (error) {
                console.error("Error guardando:", error);
                alert("Error de conexión al guardar.");
            } finally {
                btn.innerText = "Guardar Registro";
                btn.disabled = false;
            }
        });

        cargarDatos();
    </script>
</body>
</html>
